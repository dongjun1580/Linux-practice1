<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Cafe Warmth - 로그인</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.href='../index.html'">☕ Cafe Warmth</div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>로그인</h2>
            <p>Cafe Warmth에 오신 것을 환영합니다.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">이메일 (아이디)</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required placeholder="비밀번호를 입력해주세요">
                </div>
                
                <p id="error-message" class="error-msg"></p>

                <button type="submit" class="btn-primary">로그인</button>
            </form>

            <div class="auth-links">
                <span>계정이 없으신가요?</span>
                <a href="signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
