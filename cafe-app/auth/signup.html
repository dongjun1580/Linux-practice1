<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Cafe Warmth - 회원가입</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.href='../index.html'">☕ Cafe Warmth</div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>회원가입</h2>
            <p>Cafe Warmth의 회원이 되어주세요.</p>
            
            <form id="signup-form">
                <div class="input-group">
                    <label for="email">이메일 (아이디)</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required placeholder="6자리 이상 입력해주세요" minlength="6">
                </div>
                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" required placeholder="비밀번호를 다시 입력해주세요">
                </div>
                
                <p id="error-message" class="error-msg"></p>

                <button type="submit" class="btn-primary">가입하기</button>
            </form>

            <div class="auth-links">
                <span>이미 계정이 있으신가요?</span>
                <a href="login.html">로그인</a>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
