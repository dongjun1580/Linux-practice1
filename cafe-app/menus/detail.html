<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 상세</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <header class="header" id="modal-header">
        <button type="button" class="btn-back" onclick="history.back()">←</button>
        <h1 class="header-title">메뉴 상세</h1>
    </header>

    <main class="container">
        <article class="detail-card">
            <div class="image-container">
                <img id="menu-img" src="" alt="메뉴 이미지" class="menu-image">
            </div>
            
            <div class="info-container">
                <h2 id="menu-name" class="menu-name">메뉴 이름</h2>
                <p id="menu-desc" class="menu-description">메뉴 설명이 들어갑니다.</p>
                <div class="option-group" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <span class="option-label" style="font-weight:bold; font-size:1.1rem;">기본 가격</span>
                    <span id="base-price" class="menu-price" style="font-size:1.2rem;">0원</span>
                </div>
            </div>

            <section class="options-section">
                <h3 class="section-title">퍼스널 옵션</h3>
                
                <div class="option-group">
                    <span class="option-label">온도</span>
                    <div class="option-buttons">
                        <button type="button" class="btn-option active" data-type="temp" data-value="HOT">♨️ HOT</button>
                        <button type="button" class="btn-option" data-type="temp" data-value="ICED">🧊 ICED</button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">사이즈 업 (+500원)</span>
                    <div class="option-buttons">
                        <button type="button" class="btn-option active" data-type="size" data-value="기본">기본</button>
                        <button type="button" class="btn-option" data-type="size" data-value="메가">메가</button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">샷 추가 (+500원/샷)</span>
                    <div class="quantity-selector">
                        <button type="button" id="btn-shot-minus" class="btn-qty">-</button>
                        <span id="shot-count" class="qty-number">0</span>
                        <button type="button" id="btn-shot-plus" class="btn-qty">+</button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">시럽 추가 (+500원/펌프)</span>
                    <div class="quantity-selector">
                        <button type="button" id="btn-syrup-minus" class="btn-qty">-</button>
                        <span id="syrup-count" class="qty-number">0</span>
                        <button type="button" id="btn-syrup-plus" class="btn-qty">+</button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">얼음 양</span>
                    <div class="option-buttons">
                        <button type="button" class="btn-option" data-type="ice" data-value="적게">적게</button>
                        <button type="button" class="btn-option active" data-type="ice" data-value="보통">보통</button>
                        <button type="button" class="btn-option" data-type="ice" data-value="많이">많이</button>
                    </div>
                </div>
            </section>

            <section class="quantity-section">
                <div class="total-price-wrapper" style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                    <span class="total-label" style="font-size:1.1rem; color:#5c4f4e;">총 결제금액:</span>
                    <span id="total-price" class="total-price">0원</span>
                </div>
            </section>
        </article>
    </main>

    <footer class="footer-actions">
        <button type="button" id="btn-add-cart" class="btn-primary" style="width:100%;">🛒 장바구니 담기</button>
    </footer>

    <script src="detail.js"></script>
</body>
</html>
