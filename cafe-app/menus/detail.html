<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 상세 - Cafe Warmth</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">🔍 메뉴 상세</div>
        <nav class="nav-links">
            <a href="list.html" class="btn-nav">목록으로</a>
        </nav>
    </header>
    <main class="detail-main">
        <div class="detail-card">
            <h2 id="menu-name"></h2>
            <p id="menu-desc" class="menu-desc"></p>
            <div class="price-box">
                <span>기본 가격:</span>
                <strong id="menu-price"></strong>
            </div>

            <!-- 퍼스널 옵션 섹션 -->
            <div class="personal-options">
                <h3>퍼스널 옵션</h3>
                
                <div class="option-group">
                    <label>온도</label>
                    <div class="radio-group">
                        <label class="radio-btn"><input type="radio" name="temperature" value="HOT"> ♨️ HOT</label>
                        <label class="radio-btn"><input type="radio" name="temperature" value="ICED" checked> 🧊 ICED</label>
                    </div>
                </div>

                <div class="option-group">
                    <label>사이즈 업 (+500원)</label>
                    <div class="radio-group">
                        <label class="radio-btn"><input type="radio" name="size" value="regular" checked> 기본</label>
                        <label class="radio-btn"><input type="radio" name="size" value="large"> 메가</label>
                    </div>
                </div>

                <div class="option-group">
                    <label>샷 추가 (+500원/샷)</label>
                    <div class="stepper">
                        <button type="button" id="shot-minus">-</button>
                        <span id="shot-count">0</span>
                        <button type="button" id="shot-plus">+</button>
                    </div>
                </div>

                <div class="option-group">
                    <label>시럽 추가 (+500원/펌프)</label>
                    <div class="stepper">
                        <button type="button" id="syrup-minus">-</button>
                        <span id="syrup-count">0</span>
                        <button type="button" id="syrup-plus">+</button>
                    </div>
                </div>
                
                <div class="option-group" id="ice-amount-group">
                    <label>얼음 양</label>
                    <select id="ice-amount" class="custom-select">
                        <option value="normal">보통</option>
                        <option value="less">적게</option>
                        <option value="more">많이</option>
                    </select>
                </div>
            </div>

            <div class="total-price-box">
                <span>총 결제금액:</span>
                <strong id="total-price"></strong>
            </div>

            <button id="btn-add-cart" class="btn-add-cart">🛒 장바구니 담기</button>
        </div>
    </main>
    <script src="detail.js"></script>
</body>
</html>
