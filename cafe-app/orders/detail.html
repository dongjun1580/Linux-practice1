<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 상세 - Cafe Warmth</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">🔍 주문 상세 내역</div>
        <nav class="nav-links">
            <a href="list.html" class="btn-nav">목록으로</a>
        </nav>
    </header>
    <main class="orders-main">
        <div class="orders-card">
            <h2 id="order-title">주문 상세 정보</h2>
            <div class="order-info">
                <p><strong>주문번호:</strong> <span id="order-id"></span></p>
                <p><strong>주문일시:</strong> <span id="order-date"></span></p>
                <p><strong>진행상태:</strong> <span id="order-status" class="badge"></span></p>
            </div>
            
            <h3>주문하신 메뉴</h3>
            <ul id="order-items-list" class="items-list">
                <!-- JS 렌더링 -->
            </ul>
            
            <div class="order-summary">
                <span>총 결제금액</span>
                <strong id="total-price"></strong>
            </div>
        </div>
    </main>
    <script src="detail.js"></script>
</body>
</html>
