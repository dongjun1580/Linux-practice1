<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - Cafe Warmth</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">👤 마이페이지</div>
        <nav class="nav-links">
            <a href="../index.html" class="btn-nav">🏠 홈으로 가기</a>
        </nav>
    </header>
    <main class="my-main">
        <div class="profile-card">
            <div class="avatar">😄</div>
            <h2>단골 고객님</h2>
            <p>Cafe Warmth와 함께한 지 <strong>365일</strong>째</p>
        </div>
        
        <div class="menu-grid">
            <a href="../orders/list.html" class="my-menu-card">
                <h3>📦 전체 주문 내역 가기</h3>
                <p>지금까지 카페에 주문하신 모든 내역을 확인하세요.</p>
            </a>
            <a href="../basket/list.html" class="my-menu-card">
                <h3>🛒 내 장바구니 가기</h3>
                <p>미리 담아두신 맛있는 메뉴들을 확인하고 결제하세요.</p>
            </a>
        </div>

        <!-- 마이페이지 내 주문 미리보기 영역 추가 -->
        <div class="recent-orders" style="margin-top: 40px;">
            <h3 style="color: var(--text-main); margin-bottom: 15px; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;">최근 주문 내역 미리보기</h3>
            <div id="recent-orders-list">
                <!-- JS 동적 렌더링 -->
            </div>
        </div>
    </main>
    <script src="index.js?v=2"></script>
</body>
</html>
