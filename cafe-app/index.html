<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Cafe Warmth</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">☕ Cafe Warmth</div>
        <nav class="nav-links" id="auth-nav">
            <!-- 자바스크립트에서 로그인 상태에 따라 버튼 동적 렌더링 -->
        </nav>
    </header>

    <section class="banner-section">
        <div class="banner-track">
            <div class="banner-slide" style="background-color: #ff9800;">
                <div class="banner-text">
                    <h2>신메뉴 출시! 🎉</h2>
                    <p>상큼한 생딸기가 듬뿍</p>
                </div>
                <img src="https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=400&q=80" alt="신메뉴">
            </div>
            <div class="banner-slide" style="background-color: #e53935;">
                <div class="banner-text">
                    <h2>메가급 할인 이벤트</h2>
                    <p>매일 오후 2시 아메리카노 반값</p>
                </div>
            </div>
        </div>
    </section>

    <section class="hero-section">
        <div class="hero-content">
            <h1>오늘도 따뜻한<br>커피 한 잔 어떠세요?</h1>
        </div>
    </section>

    <section class="category-section">
        <div class="category-tabs">
            <button class="tab-btn active" data-category="all">전체 메뉴</button>
            <button class="tab-btn" data-category="coffee">☕ 커피</button>
            <button class="tab-btn" data-category="beverage">🍹 음료</button>
            <button class="tab-btn" data-category="dessert">🍰 디저트</button>
        </div>
    </section>

    <main class="menu-container">
        <div id="main-menu-grid" class="menu-grid">
            </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">홈</span>
        </a>
        <a href="orders/list.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span class="nav-label">주문내역</span>
        </a>
        <a href="basket/list.html" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">장바구니</span>
        </a>
        <a href="my/" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">마이페이지</span>
        </a>
    </nav>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    
    <script src="index.js?v=2"></script>
</body>
</html>
