<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 관리 상세 - 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <header class="admin-header">
        <h1>🔍 고객 주문 상세 및 처리</h1>
        <nav><a href="list.html">목록으로 돌아가기</a></nav>
    </header>
    <main class="detail-container">
        <div class="detail-card">
            <div class="order-info">
                <p><strong>주문번호:</strong> <span id="order-id"></span></p>
                <p><strong>주문일시:</strong> <span id="order-date"></span></p>
            </div>
            
            <h3>주문 메뉴 내역</h3>
            <ul id="order-items-list" class="items-list">
                <!-- JS 렌더링 -->
            </ul>
            <div class="total-price-box">
                <span>결제 완료 금액: </span>
                <strong id="total-price"></strong>
            </div>

            <div class="status-control">
                <h3>주문 상태 변경</h3>
                <div class="status-buttons">
                    <button class="status-btn" data-status="준비 중">접수 됨 (준비 중)</button>
                    <button class="status-btn" data-status="준비 완료">제조 완료 (픽업 대기)</button>
                    <button class="status-btn" data-status="수령 완료">고객 수령 완료</button>
                </div>
            </div>
        </div>
    </main>
    <script src="detail.js"></script>
</body>
</html>
