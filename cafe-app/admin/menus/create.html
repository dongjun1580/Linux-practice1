<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 메뉴 추가 - 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="create.css">
</head>
<body>
    <header class="admin-header">
        <h1>☕ 새 메뉴 추가</h1>
        <nav><a href="list.html">목록으로 돌아가기</a></nav>
    </header>
    <main class="form-container">
        <form id="create-form" class="admin-form">
            <div class="form-group">
                <label>ID</label>
                <input type="text" id="menuId" required placeholder="예: c1">
            </div>
            <div class="form-group">
                <label>카테고리</label>
                <select id="menuCategory" required>
                    <option value="coffee">커피 (coffee)</option>
                    <option value="beverage">음료 (beverage)</option>
                    <option value="dessert">디저트 (dessert)</option>
                </select>
            </div>
            <div class="form-group">
                <label>메뉴명</label>
                <input type="text" id="menuName" required>
            </div>
            <div class="form-group">
                <label>가격 (원)</label>
                <input type="number" id="menuPrice" required>
            </div>
            <div class="form-group">
                <label>설명</label>
                <textarea id="menuDesc" rows="3"></textarea>
            </div>
            <button type="submit" class="submit-btn">추가하기</button>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase.js"></script>
    <script src="create.js"></script>
</body>
</html>
